name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build for GitHub Pages
        working-directory: frontend
        env:
          # Base URL must match your repo name: /ip-tv-404/
          VITE_BASE_URL: /ip-tv-404/
          # Optional: set your Cloudflare Worker URL here for CORS proxy
          # VITE_PROXY_URL: https://iptv-worldcup-proxy.YOUR_SUBDOMAIN.workers.dev
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
