# Nginx reverse proxy config for World Cup IPTV
# Replace yourdomain.com with your actual domain
# After SSL: uncomment the HTTPS server block and run certbot

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Uncomment after running certbot:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://iptv:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Long timeouts for stream proxying
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Buffer tuning for HLS segments
        proxy_buffering          on;
        proxy_buffer_size        16k;
        proxy_buffers            8 32k;
        proxy_busy_buffers_size  64k;
    }
}

