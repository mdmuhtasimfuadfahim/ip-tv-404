version: '3.9'

services:
  iptv:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_PROXY_URL: ${VITE_PROXY_URL:-}
        VITE_BASE_URL: /
    image: iptv-worldcup:latest
    container_name: iptv-worldcup
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: iptv-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # mount after certbot
    depends_on:
      - iptv
    profiles:
      - production   # only start with: docker compose --profile production up
